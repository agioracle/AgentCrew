appId: com.agentcrew.app
productName: AgentCrew
copyright: Copyright (c) 2026 AgentCrew

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*
  - node_modules/@xterm/headless/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/node-addon-api/**/*
  - node_modules/@memvid/sdk/**/*
  - node_modules/@memvid/sdk-darwin-arm64/**/*
  - node_modules/@memvid/sdk-darwin-x64/**/*
  - node_modules/@memvid/sdk-win32-x64-msvc/**/*
  - node_modules/@memvid/sdk-linux-x64-gnu/**/*
  - node_modules/@memvid/sdk-linux-arm64-gnu/**/*

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*
  - node_modules/@memvid/sdk-*/**/*.node
  - "**/*.node"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

publish:
  provider: github
  owner: agioracle
  repo: AgentCrew
  releaseType: release
